# =============================================================================
# config.toml — AI Director Video Commentary (Enhanced Version)
# All configuration from this file. No .env needed.
# =============================================================================

[api]
# ---- Backend viết kịch bản (hooks + narration) ----
# "local" (MẶC ĐỊNH): chạy model nhẹ ngay trên máy/Colab, không cần API key,
#   không có rủi ro "context_length_exceeded" hay "model reasoning nuốt hết
#   token" mà backend cerebras từng gặp với phim nhiều scene. Xem
#   [processing] script_local_* bên dưới để đổi model/device.
# "cerebras": dùng lại API Cerebras như bản gốc — đổi về giá trị này nếu bạn
#   muốn quay lại (vẫn được hỗ trợ đầy đủ, đã vá lỗi reasoning bên dưới).
script_backend = "local"

# Cerebras API for script writing (chỉ dùng khi script_backend = "cerebras")
cerebras_api_key = "csk-vdmwee9e6kpmpyxdcfkvrxrcyhekh5w6vk39nwfc9wxmpkhk"
cerebras_base_url = "https://api.cerebras.ai/v1"
cerebras_model = "zai-glm-4.7"
cerebras_max_tokens = 8000
cerebras_temperature = 0.8
# zai-glm-4.7 là model REASONING (tự "suy nghĩ nội bộ" trước khi trả lời).
# Với các lệnh gọi ở đây ta chỉ cần JSON có cấu trúc, không cần suy luận
# thành tiếng — tắt nó đi để tránh lỗi "response rỗng vì hết ngân sách token
# cho suy luận" (xem BUGFIX trong script_writer.py). Đổi false nếu muốn giữ
# reasoning (không khuyến khích, tốn token + dễ lỗi hơn cho tác vụ JSON).
cerebras_disable_reasoning = true
# Context window THẬT của model Cerebras đang dùng (input+output cộng lại).
# Dùng để chia semantic blocks thành nhiều batch nhỏ khi sinh narration cho
# phim dài (xem BUGFIX trong script_writer.py: trước đây dồn hết 1600+ scene
# vào 1 request -> lỗi context_length_exceeded). Đổi nếu bạn dùng model có
# context lớn hơn/nhỏ hơn 8192 token.
cerebras_max_context_tokens = 8192
# Số token output tối đa CHO MỖI BATCH narration (khác với cerebras_max_tokens
# ở trên, vốn dùng cho các lệnh gọi 1-shot khác như generate_hooks). Để nhỏ
# vì mỗi batch chỉ cần vài chục câu, dành phần lớn ngân sách token cho input
# (scene blocks).
cerebras_narration_batch_max_tokens = 2000

# Hugging Face token (for Qwen3-VL-4B-Instruct or other models)
hf_token = ""

# Mistral API for vision analysis
mistral_api_key = "WJkOtf6FxncjGsfLs2mujxew0ikNIDKX"
mistral_base_url = "https://api.mistral.ai/v1"

[tts]
# edge-tts: no API key needed, just select voice
engine = "edge-tts"
# Vietnamese: "vi-VN-HoangMinhNeural", "vi-VN-NamMinhNeural"
# English: "en-US-JennyNeural", "en-US-GuyNeural"
voice = "vi-VN-HoangMinhNeural"
rate = "+0%"
volume = "+0%"
pitch = "+0Hz"
# Số câu tổng hợp song song cùng lúc. edge-tts ổn định, không rate-limit
# cứng như API trả phí -> chạy song song thay vì tuần tự giúp nhanh hơn
# nhiều lần với storyboard có nhiều câu. 40 là mức an toàn thực tế (đủ
# nhanh, ít khi bị timeout/nghẽn do mở quá nhiều kết nối cùng lúc).
max_concurrency = 40

[processing]
# ---- Script writing (hooks + narration), backend "local" ----
# Model nhẹ/nhanh, viết tiếng Việt tốt, không cần API key/không rate limit.
# Cùng cỡ (~4B) với model vision local (Qwen3-VL-4B) nên không tốn thêm
# nhiều VRAM — model được giải phóng ngay sau khi stage 'script' xong.
script_local_model_name = "Qwen/Qwen3-4B-Instruct-2507"
script_local_device = "auto"          # auto | cuda | cpu | mps
script_local_dtype = "bfloat16"       # bfloat16 | float16 | float32
# Quantization để giảm VRAM cần thiết khi tải model (chỉ áp dụng khi có GPU NVIDIA):
#   "auto" (MẶC ĐỊNH): tự bật 4-bit khi VRAM còn trống < 12GB lúc load (Colab T4
#     dùng chung, laptop GPU 6-8GB, v.v.), giữ full-precision nếu VRAM dư dả.
#   "4bit" | "8bit": ép luôn dùng quantization (cần package `bitsandbytes`).
#   "none": tắt hẳn, luôn tải full-precision theo script_local_dtype ở trên.
# Ngoài ra, "ngân sách" context/batch (script_local_max_context_tokens bên dưới)
# cũng được TỰ ĐỘNG giảm theo VRAM thật phát hiện lúc chạy — con số cấu hình chỉ
# là TRẦN tối đa, không phải giá trị cố định — và nếu vẫn hết VRAM/RAM giữa lúc
# sinh narration, pipeline tự chia nhỏ batch rồi thử lại thay vì crash (xem
# LocalModelOOMError trong script_writer.py). Nhờ 2 lớp bảo vệ này, không cần
# chỉnh tay theo từng loại phần cứng — script tự thích ứng.
script_local_quantization = "auto"    # auto | 4bit | 8bit | none
script_local_temperature = 0.7
script_local_top_p = 0.8
script_local_top_k = 20
# Số token output tối đa CHO MỖI BATCH narration khi chạy local. Local không
# bị giới hạn context ngặt nghèo như Cerebras nên có thể để rộng rãi hơn.
script_local_max_new_tokens = 3000
# Ngân sách token INPUT tối đa cho mỗi batch narration khi chạy local — có
# thể để lớn hơn nhiều so với Cerebras (8192) vì không bị giới hạn context
# ngặt nghèo, giúp ít batch hơn (nhanh hơn, mạch truyện liền lạc hơn vì model
# thấy nhiều scene cùng lúc). Giảm nếu máy ít VRAM/RAM và gặp OOM.
script_local_max_context_tokens = 24000

# ---- ASR (faster-whisper) ----
asr_model_size = "small"          # tiny/base/small/medium/large-v3
asr_device = "auto"               # auto | cuda | cpu
asr_compute_type = "auto"         # auto | float16 | int8
asr_language = "vi"               # language code, leave empty "" for auto-detect

# ---- Vision ----
# "local" (needs GPU) | "cerebras" | "mistral" | "moondream" (CPU-only, nhanh
# nhất trong các lựa chọn không-GPU — dùng cho máy/CI không có GPU như
# GitHub Actions runner; xem so sánh chi tiết trong docstring đầu vision.py)
vision_backend = "moondream"
cerebras_vision_model = "gemma-4-31b"
cerebras_vision_max_images = 2
cerebras_vision_rpm = 5

# ---- Vision backend "mistral" ----
mistral_vision_model = "mistral-large-latest"
mistral_vision_max_images = 8
mistral_vision_rpm = 15

# ---- Vision backend "moondream" (Moondream2, ~1.9B, tối ưu CPU/edge) ----
# Model nhỏ hơn Qwen3-VL-4B ~2x và được huấn luyện riêng để chạy nhanh trên
# CPU, nên phù hợp cho GitHub Actions runner (không GPU). Đổi lại chỉ đọc
# 1 keyframe đại diện/scene (không gộp cả vision_frames_per_scene ảnh như
# backend "local"), nên chất lượng đọc cảnh (đặc biệt emotion/visual_intensity)
# kém tinh tế hơn Qwen3-VL-4B hoặc backend API (cerebras/mistral).
# revision: để trống "" nếu muốn luôn dùng bản mới nhất trên Hugging Face
# (rủi ro: HF có thể đổi API khiến code lỗi); pin ngày cụ thể nếu cần ổn định.
moondream_model_name = "vikhyatk/moondream2"
moondream_revision = "2025-06-21"

vision_model_name = "Qwen/Qwen3-VL-4B-Instruct"
vision_device = "auto"
vision_dtype = "float16"
vision_max_new_tokens = 512
vision_attn_implementation = "sdpa"
# Đã tăng từ 4 -> 8: sau khi keyframe được resize (xem keyframe_max_side bên dưới),
# mỗi ảnh dùng ít VRAM hơn nhiều lần nên có thể gộp nhiều scene/batch hơn mà
# vẫn không OOM. Nếu máy vẫn OOM, hạ số này xuống trước (không cần đụng vào
# keyframe_max_side).
vision_batch_size = 8
vision_frames_per_scene = 3

# ---- Keyframe resize (fix OOM gốc + tăng tốc) ----
# Trước đây keyframe được lưu ở đúng độ phân giải gốc của video (1080p/4K),
# khiến Qwen3-VL (dynamic-resolution) sinh ra rất nhiều vision token và cần
# hàng GiB VRAM chỉ cho 1 lần forward (kể cả batch_size=1). Resize cạnh dài
# nhất về keyframe_max_side px trước khi lưu giúp giảm VRAM + tăng tốc
# generate() đáng kể, trong khi 768px vẫn đủ để model đọc bố cục/cảnh/nhân
# vật/chữ lớn. Có thể tăng lên 960-1024 nếu cần đọc chữ nhỏ chính xác hơn
# và VRAM còn dư, hoặc hạ xuống 512-576 nếu vẫn OOM.
keyframe_max_side = 768
keyframe_jpeg_quality = 90

# ---- Scene detection ----
scene_threshold = 27.0
min_scene_len_sec = 1.0

# ---- Narration / storyboard ----
narration_pov = "third_person"    # third_person | first_person
content_type = "movie"            # movie | tv_drama | anime | short_drama | foreign_language_commentary
genre = "drama"
# Ngôn ngữ VIẾT KỊCH BẢN/NARRATION (hook + toàn bộ câu thoại dẫn chuyện),
# dùng tên ngôn ngữ đầy đủ (LLM hiểu rõ hơn mã ISO) — PHẢI khớp với giọng
# đọc TTS ở mục [tts] voice bên trên, nếu không giọng Việt sẽ đọc văn bản
# tiếng Anh (hoặc ngược lại), nghe rất lạc quẻ. Trước đây key này không tồn
# tại -> script_writer.py chỉ "đoán" ngôn ngữ theo plot_summary do người
# dùng nhập, nếu bỏ trống (Enter) sẽ mặc định về tiếng Anh dù voice đã để
# tiếng Việt.
narration_language = "Vietnamese"
target_duration_sec = 180
chars_per_sec = 4.0                # CJK characters per second
words_per_sec = 2.5                 # Vietnamese/English words per second
buffer_after_speech = 0.1
min_clip_duration = 1.0
max_speed_ratio = 4.0

# ---- Checkpoint frequency ----
# micro_checkpoint_interval: save checkpoint every N items (scenes/batches)
# Lower = more frequent (near real-time). Default: 1 = every item.
micro_checkpoint_interval = 1
# auto_sync_cloud: auto sync to cloud storage (Tigris) after each checkpoint
auto_sync_cloud = true

[reference]
# Link video tham khảo (đối thủ) để AI đối chiếu đúng tên nhân vật/cốt
# truyện khi viết narration — KHÔNG dùng để sao chép văn phong.
urls = []
languages = ["vi", "en"]
max_chars_per_video = 6000
use_ytdlp_fallback = true
ytdlp_cookies_from_browser = ""

[paths]
input_video = "./input/source.mp4"
output_dir = "./output"
checkpoint_dir = "./checkpoints"
model_cache_dir = "./model_cache"
# projects_dir: where all projects are stored
projects_dir = "./projects"

[cloud]
# Đang dùng Tigris (https://www.tigrisdata.com). Mục này (và code trong
# cloud_storage.py) hoàn toàn generic cho mọi provider tương thích S3 —
# chỉ cần đổi giá trị bên dưới là dùng được provider khác (Filebase, AWS S3,
# Cloudflare R2, ...), không cần sửa code.
# Access key (Tigris)
access_key = "tid_dNkBsQSwjrwPNURmxVXaAVHbTti_atxKRhbAFLgzidMEUBhiNs"
# Secret key (Tigris)
secret_key = "tsec_tSF2U_bmM6qAkMneeR848yOrZUzVvYAcfVFTBbL7iJIdhcoI1SJGO_kW1AthM4gqqhW9CY"
# Bucket name
bucket_name = "ai-director-video-quynh"
# Tigris S3 endpoint (dùng ngoài mạng Fly.io; nếu chạy trên Fly.io có thể
# đổi sang "https://fly.storage.tigris.dev" để giảm độ trễ)
endpoint_url = "https://t3.storage.dev"
# Tigris dùng region "auto" (không phải vùng AWS cụ thể như Filebase)
region_name = "auto"
# Tigris BẮT BUỘC dùng virtual-hosted style (bucket nằm trong hostname),
# khác với Filebase dùng "path". Đặt sai sẽ gây lỗi 403/404 khó hiểu.
addressing_style = "virtual"
# Enable/disable cloud sync
enabled = true

[project]
# Default project settings
auto_project_scan = true
show_project_menu_on_start = true
# Auto-save interval in seconds (0 = after each stage)
auto_save_interval = 0
# Max cloud sync retry attempts
cloud_sync_retries = 3
