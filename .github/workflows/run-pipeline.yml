name: Run AI Director Video Pipeline

# Chạy khi: push lên main, bấm tay (Actions -> Run workflow), hoặc theo lịch
# 08:00 sáng (giờ Việt Nam, UTC+7) mỗi ngày = 01:00 UTC.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}

# Không cho 2 lần chạy chồng lên nhau (vd. vừa push vừa tới giờ lịch chạy
# cùng lúc) — job sau xếp hàng chờ thay vì chạy song song và tranh checkpoint
# trên cùng 1 project.
concurrency:
  group: ai-director-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # Giới hạn cứng của GitHub Actions là 6 giờ/job (360 phút) và không thể
    # tăng — đặt 350 để job tự dừng sớm hơn vài phút, đủ thời gian ghi
    # checkpoint cuối cùng và upload log gọn gàng thay vì bị kill giữa chừng.
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Dọn bớt disk trên runner (phòng hờ OOM/hết disk)
        # Runner miễn phí chỉ đảm bảo ~14GB disk trống. Xoá bớt vài bộ SDK
        # cài sẵn không dùng tới (Android, .NET, Haskell, CodeQL...) để có
        # thêm khoảng trống an toàn, phòng trường hợp thiếu secret khiến
        # config.py không override được sang backend nhẹ (xem config.py:
        # _apply_ci_safe_overrides) và job vẫn phải tải model local.
        run: |
          echo "Trước khi dọn:" && df -h /
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet /opt/hostedtoolcache/CodeQL || true
          echo "Sau khi dọn:" && df -h /

      - name: Cài FFmpeg
        # Cài trước bằng sudo ở đây để platform_utils.ensure_ffmpeg() trong
        # code (gọi "apt-get" KHÔNG có sudo) thấy ffmpeg đã sẵn sàng và bỏ
        # qua bước tự cài của nó — chạy "apt-get" không sudo trên runner sẽ
        # bị lỗi quyền (permission denied) vì user chạy job không phải root.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -n 1

      - name: Cài Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Kiểm tra config.toml đã có sẵn trong repo chưa
        # Hỗ trợ cả 2 cách README mô tả: (a) commit thẳng config.toml thật
        # (README có cảnh báo, không khuyến khích với repo public), hoặc
        # (b) dùng config.ci.toml.template + GitHub Secrets (khuyến khích).
        # Nếu config.toml đã được checkout ra từ repo, dùng luôn, không ghi
        # đè bằng bản render từ Secrets (tránh phải thiết lập Secrets nếu
        # người dùng đã chọn cách (a)).
        id: check_config
        run: |
          if [ -f config.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "[ci] Tìm thấy config.toml có sẵn trong repo — dùng luôn, bỏ qua bước dựng từ Secrets."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dựng config.toml từ Secrets
        if: steps.check_config.outputs.exists == 'false'
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          CLOUD_ACCESS_KEY: ${{ secrets.CLOUD_ACCESS_KEY }}
          CLOUD_SECRET_KEY: ${{ secrets.CLOUD_SECRET_KEY }}
          CLOUD_BUCKET_NAME: ${{ secrets.CLOUD_BUCKET_NAME }}
          CLOUD_ENDPOINT_URL: ${{ secrets.CLOUD_ENDPOINT_URL }}
          CLOUD_REGION_NAME: ${{ secrets.CLOUD_REGION_NAME }}
          CLOUD_ADDRESSING_STYLE: ${{ secrets.CLOUD_ADDRESSING_STYLE }}
        run: python .github/scripts/render_ci_config.py

      - name: Chạy pipeline (project mới nhất chưa xong)
        run: python ci_run_latest_project.py

      # Máy ảo bị xoá sạch sau khi job kết thúc nên bước này không thật sự
      # cần thiết để "dọn dẹp", nhưng vẫn xoá config.toml (chứa key thật vừa
      # render ra) ngay khi xong việc, đề phòng bước debug/artifact phía sau
      # lỡ đọc nhầm thư mục gốc.
      - name: Xoá config.toml chứa key thật
        if: always()
        run: rm -f config.toml

      # Nếu job lỗi giữa chừng, đính kèm log/metadata của project đang xử lý
      # để dễ chẩn đoán — KHÔNG đính kèm video/audio (quá nặng, và bản đầy đủ
      # đã có trên cloud rồi nếu sync thành công trước lúc lỗi).
      - name: Upload log khi lỗi (để debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ai-director-debug-${{ github.run_id }}
          path: |
            projects/**/_project_meta.json
            projects/**/checkpoints/**/*.json
          if-no-files-found: ignore
          retention-days: 3
