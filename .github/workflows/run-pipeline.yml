name: Run AI Director Video Pipeline

# ĐÃ ĐỔI SANG DÙNG THẲNG config.toml (đã commit kèm API key thật vào repo
# theo README mục "Chạy tự động bằng GitHub Actions") — KHÔNG dùng
# config.ci.toml.template + GitHub Secrets nữa. Rủi ro (repo public lộ key)
# người dùng đã tự xác nhận chấp nhận; workflow này chỉ đọc thẳng config.toml
# có sẵn trong repo, không render gì thêm.

on:
  schedule:
    # 01:00 UTC = 08:00 giờ Việt Nam (UTC+7), chạy mỗi ngày.
    - cron: "0 1 * * *"
  workflow_dispatch: {}

concurrency:
  # Không cho 2 lần chạy chồng lên nhau (tránh 2 job cùng đụng vào 1 project
  # trên cloud cùng lúc — checkpoint/cloud sync không được thiết kế cho
  # ghi đồng thời).
  group: ai-director-video-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # Chừa dư so với giới hạn cứng 6h/job của GitHub để job luôn có cơ hội
    # chạy xong bước dọn rác + đóng dashboard gọn gàng thay vì bị kill giữa
    # chừng đúng lúc đang ghi checkpoint.
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space (dọn rác runner trước khi tải model local)
        run: |
          echo "--- Disk trước khi dọn ---"
          df -h /
          # Gỡ các bộ công cụ cài sẵn nhưng project này KHÔNG dùng tới
          # (.NET, Android SDK, GHC, CodeQL, Boost...) — kỹ thuật quen thuộc
          # để lấy lại 15-25GB trên runner GitHub-hosted, cần thiết khi ưu
          # tiên chạy backend "local" (model AI tải về máy) thay vì gọi API.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"/PyPy \
            /usr/lib/jvm /opt/az 2>/dev/null || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get clean || true
          echo "--- Disk sau khi dọn ---"
          df -h /

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Ensure ffmpeg
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y ffmpeg
          else
            echo "ffmpeg đã có sẵn trên runner, bỏ qua cài đặt."
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify config.toml exists
        run: |
          if [ ! -f config.toml ]; then
            echo "::error::Không tìm thấy config.toml trong repo. Xem README mục" \
                 "'Chạy tự động bằng GitHub Actions' để commit file này (kèm API key thật)."
            exit 1
          fi

      - name: Start progress dashboard tunnel (Cloudflare Quick Tunnel)
        run: |
          # Cloudflare Quick Tunnel: KHÔNG cần tài khoản Cloudflare, KHÔNG cần
          # API token/DNS riêng — chỉ cần binary cloudflared, tự cấp 1 link
          # https://xxxx.trycloudflare.com sống trong lúc tiến trình còn chạy.
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          nohup ./cloudflared tunnel --url http://localhost:8787 > cloudflared.log 2>&1 &
          disown

          echo "Đang đợi cloudflared cấp link (tối đa 30s)..."
          URL=""
          for i in $(seq 1 30); do
            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' cloudflared.log | head -n1 || true)
            if [ -n "$URL" ]; then break; fi
            sleep 1
          done

          {
            echo "### 📺 Theo dõi tiến trình pipeline trực tiếp"
            if [ -n "$URL" ]; then
              echo "$URL"
              echo ""
              echo "_Link chỉ tồn tại trong lúc job này đang chạy — hiện % hoàn tất từng" \
                   "stage kèm ETA dự đoán, tự làm mới mỗi 3 giây._"
            else
              echo "⚠️ Không lấy được link sau 30s — xem log bước này hoặc file \`cloudflared.log\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "PROGRESS_URL=${URL:-unavailable}" >> "$GITHUB_ENV"
          echo "Link dashboard: ${URL:-(không lấy được)}"

      - name: Run pipeline (ci_run_latest_project.py)
        run: python ci_run_latest_project.py

      - name: Stop tunnel
        if: always()
        run: |
          pkill -f "cloudflared tunnel" || true

      - name: Upload cloudflared log (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflared-log
          path: cloudflared.log
          if-no-files-found: ignore
          retention-days: 3
